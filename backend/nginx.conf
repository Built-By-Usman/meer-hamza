# Nginx Production Configuration Template for FastAPI
# Place the rate limit zone definition inside your global /etc/nginx/nginx.conf HTTP block:
# limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;

log_format json_combined escape=json
  '{"time_local":"$time_local",'
  '"remote_addr":"$remote_addr",'
  '"request":"$request",'
  '"status": "$status",'
  '"body_bytes_sent":"$body_bytes_sent",'
  '"request_time":"$request_time",'
  '"http_referrer":"$http_referer",'
  '"http_user_agent":"$http_user_agent"}';

server {
    listen 80;
    server_name api.meerhamza.com;  # Replace with actual deployment domain

    access_log /var/log/nginx/ecommerce_access.log json_combined;
    error_log /var/log/nginx/ecommerce_error.log warn;

    client_max_body_size 10M;  # Support image uploads up to 10MB

    # Gzip Compression for low-powered VPS bandwidth savings
    gzip on;
    gzip_types application/json text/plain text/css application/javascript text/xml;
    gzip_min_length 1000;

    # Defense-in-depth security headers matching application policies
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Apply strict connection rate limit on auth endpoints
    location /auth/ {
        limit_req zone=auth_limit burst=5 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Proxy general catalog traffic to FastAPI backend
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
